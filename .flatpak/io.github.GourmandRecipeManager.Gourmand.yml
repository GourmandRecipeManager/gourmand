app-id: io.github.GourmandRecipeManager.Gourmand
runtime: org.gnome.Platform
# https://release.gnome.org/calendar/
runtime-version: '50'
sdk: org.gnome.Sdk
command: gourmand

finish-args:
  - --filesystem=host
  - --socket=fallback-x11
  - --socket=pulseaudio
  - --share=network
modules:
  - name: poppler
    buildsystem: cmake-ninja
    config-opts:
      - -DENABLE_UTILS=OFF
      - -DENABLE_CPP=OFF
      - -DENABLE_QT5=OFF
      - -DENABLE_QT6=OFF
      - -DENABLE_NSS3=OFF
      - -DENABLE_GPGME=OFF
      - -DENABLE_BOOST=OFF
      - -DCMAKE_INSTALL_LIBDIR=lib
    sources:
      - url: https://poppler.freedesktop.org/poppler-26.03.0.tar.xz
        sha256: 8b3c5e2a9f2ab4c3ec5029f28af1b433c6b71f0d1e7b3997aa561cf1c0ca4ebe
        type: archive

  - name: cpython
    sources:
      - type: archive
        url: https://www.python.org/ftp/python/3.11.15/Python-3.11.15.tar.xz
        sha256: 272179ddd9a2e41a0fc8e42e33dfbdca0b3711aa5abf372d3f2d51543d09b625

  - name: intltool
    buildsystem: autotools
    sources:
      - type: archive
        url: https://launchpad.net/intltool/trunk/0.51.0/+download/intltool-0.51.0.tar.gz
        sha256: 67c74d94196b153b774ab9f89b2fa6c6ba79352407037c8c14d5aeb334e959cd

  - name: gourmand
    buildsystem: simple
    build-options:
      build-args:
        - --share=network
    build-commands:
      - python3 -m pip install --upgrade pip setuptools wheel
      - pip3 install --prefix=/app .[epub-export,pdf-export,spellcheck,web-import]
      - install -Dm644 data/io.github.GourmandRecipeManager.Gourmand.desktop -t /app/share/applications/
      - install -Dm644 data/io.github.GourmandRecipeManager.Gourmand.svg -t /app/share/icons/hicolor/scalable/apps/
    sources:
      - type: git
        branch: main
        url: https://github.com/GourmandRecipeManager/gourmand
