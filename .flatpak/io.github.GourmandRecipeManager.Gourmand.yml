app-id: io.github.GourmandRecipeManager.Gourmand
runtime: org.gnome.Platform
# https://release.gnome.org/calendar/
runtime-version: '50'
sdk: org.gnome.Sdk
command: gourmand

finish-args:
  - --filesystem=xdg-documents
  - --filesystem=xdg-download
  - --filesystem=xdg-pictures
  - --filesystem=xdg-config/Gourmand:create
  - --filesystem=xdg-data/Gourmand:create
  - --socket=wayland
  - --socket=fallback-x11
  - --share=ipc
  - --socket=pulseaudio
  - --share=network
build-options:
  env:
    PIP_PREFIX: /app
cleanup:
  - '*.a'
  - '*.la'
  - /include
  - /lib/pkgconfig
  - /share/aclocal
  - /lib/cmake
  - /share/gir-1.0
  - /share/man

modules:
  - name: poppler
    buildsystem: cmake-ninja
    config-opts:
      - -DENABLE_UTILS=OFF
      - -DENABLE_CPP=OFF
      - -DENABLE_QT5=OFF
      - -DENABLE_QT6=OFF
      - -DENABLE_NSS3=OFF
      - -DENABLE_GPGME=OFF
      - -DENABLE_BOOST=OFF
      - -DCMAKE_INSTALL_LIBDIR=lib
    sources:
      - url: https://poppler.freedesktop.org/poppler-26.03.0.tar.xz
        sha256: 8b3c5e2a9f2ab4c3ec5029f28af1b433c6b71f0d1e7b3997aa561cf1c0ca4ebe
        type: archive

  - name: cpython
    buildsystem: autotools
    sources:
      - type: git
        url: https://github.com/python/cpython.git
        tag: v3.13.13

  - name: intltool
    buildsystem: autotools
    sources:
      - type: archive
        url: https://launchpad.net/intltool/trunk/0.51.0/+download/intltool-0.51.0.tar.gz
        sha256: 67c74d94196b153b774ab9f89b2fa6c6ba79352407037c8c14d5aeb334e959cd

  - name: setuptools
    buildsystem: simple
    build-commands:
      - pip3 install --prefix=/app --no-deps setuptools-*.whl
    sources:
      - type: file
        url: https://files.pythonhosted.org/packages/9d/76/f789f7a86709c6b087c5a2f52f911838cad707cc613162401badc665acfe/setuptools-82.0.1-py3-none-any.whl
        sha256:  a59e362652f08dcd477c78bb6e7bd9d80a7995bc73ce773050228a348ce2e5bb

  - name: PyGObject
    buildsystem: meson
    sources:
      - type: git
        url: https://github.com/GNOME/pygobject.git
        tag: 3.50.0

  - RecipeScrapersDependencies.yml
  - EnchantDependencies.yml
  - PipDependencies.yml

  - name: gourmand
    buildsystem: simple
    build-commands:
      - pip3 install --prefix=/app --no-build-isolation .
    # the following 10 lines were recommended by Grok during troubleshooting
    # Full recursive copy of src/gourmand (most reliable for data files + plugins)
    - mkdir -p /app/lib/python3.13/site-packages/gourmand
    - cp -r src/gourmand/* /app/lib/python3.13/site-packages/gourmand/
    # Explicitly install the nutrition plugin's __init__ to trigger registration
    - python3 -c "
      import sys
      sys.path.insert(0, '/app/lib/python3.13/site-packages')
      import gourmand.plugins.nutritional_information.main_plugin
      print('Nutrition plugin preloaded during build')
    "
      - install -Dm644 data/io.github.GourmandRecipeManager.Gourmand.desktop -t /app/share/applications/
      - install -Dm644 data/io.github.GourmandRecipeManager.Gourmand.svg -t /app/share/icons/hicolor/scalable/apps/
    sources:
      - type: git
        branch: main
        url: https://github.com/GourmandRecipeManager/gourmand
